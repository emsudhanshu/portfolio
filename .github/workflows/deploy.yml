name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          envs: REACT_APP_GEMINI_API_KEY,REPO_URL
          script: |
            set -euo pipefail

            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            mkdir -p ~/portfolio
            if [ ! -d ~/portfolio/.git ]; then
              rm -rf ~/portfolio
              git clone "${REPO_URL}" ~/portfolio
            fi

            cd ~/portfolio
            git fetch origin master
            git reset --hard origin/master

            ${SUDO} docker stop portfolio-app || true
            ${SUDO} docker rm portfolio-app || true

            ${SUDO} docker build \
              --build-arg REACT_APP_GEMINI_API_KEY="${REACT_APP_GEMINI_API_KEY}" \
              -t portfolio-app .

            ${SUDO} docker run -d \
              --name portfolio-app \
              --restart unless-stopped \
              -p 80:80 \
              portfolio-app

            ${SUDO} docker image prune -f
            ${SUDO} docker ps
