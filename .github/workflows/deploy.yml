name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          target: ~/portfolio
          overwrite: true
          source: "Dockerfile,nginx.conf,.dockerignore,package.json,package-lock.json,public,src"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          envs: REACT_APP_GEMINI_API_KEY
          script: |
            set -euo pipefail

            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            mkdir -p ~/portfolio
            cd ~/portfolio

            ${SUDO} docker stop portfolio-app || true
            ${SUDO} docker rm portfolio-app || true

            ${SUDO} docker build \
              --build-arg REACT_APP_GEMINI_API_KEY="${REACT_APP_GEMINI_API_KEY}" \
              -t portfolio-app .

            ${SUDO} docker run -d \
              --name portfolio-app \
              --restart unless-stopped \
              -p 80:80 \
              portfolio-app

            ${SUDO} docker image prune -f
            ${SUDO} docker ps
