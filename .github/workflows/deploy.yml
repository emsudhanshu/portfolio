name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          REACT_APP_GEMINI_API_KEY: ${{ secrets.REACT_APP_GEMINI_API_KEY }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: REACT_APP_GEMINI_API_KEY,REPO_URL
          script: |
            set -euo pipefail

            echo "[1/8] starting deploy"

            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            echo "[2/8] preparing repo directory"
            mkdir -p ~/portfolio
            if [ ! -d ~/portfolio/.git ]; then
              rm -rf ~/portfolio
              git clone "${REPO_URL}" ~/portfolio
            fi

            cd ~/portfolio
            echo "[3/8] syncing repo"
            git fetch origin master
            git reset --hard origin/master

            echo "[4/8] stopping old containers"
            ${SUDO} docker stop portfolio-app || true
            ${SUDO} docker stop portfolio-container || true
            ${SUDO} docker rm portfolio-app || true
            ${SUDO} docker rm portfolio-container || true

            PORT_80_CONTAINERS="$(${SUDO} docker ps -q --filter publish=80)"
            if [ -n "${PORT_80_CONTAINERS}" ]; then
              ${SUDO} docker rm -f ${PORT_80_CONTAINERS}
            fi

            if ${SUDO} sh -c "ss -ltnp 2>/dev/null | grep -Eq 'LISTEN.+:80([[:space:]]|$)'"; then
              echo "Port 80 is still busy on EC2 after Docker cleanup."
              ${SUDO} ss -ltnp 2>/dev/null | grep -E ':80([[:space:]]|$)' || true
              exit 1
            fi

            echo "[5/8] building docker image"
            ${SUDO} docker build \
              --build-arg REACT_APP_GEMINI_API_KEY="${REACT_APP_GEMINI_API_KEY}" \
              -t portfolio-app .

            echo "[6/8] starting container"
            ${SUDO} docker run -d \
              --name portfolio-app \
              --restart unless-stopped \
              -p 80:80 \
              portfolio-app

            echo "[7/8] pruning old images"
            ${SUDO} docker image prune -f

            echo "[8/8] running containers"
            ${SUDO} docker ps
