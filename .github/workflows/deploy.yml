name: Build and Deploy to EC2

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  ECR_REPOSITORY: portfolio
  CONTAINER_NAME: portfolio-app
  HOST_PORT: "80"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR details
        id: ecr
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

          echo "registry=${REGISTRY}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.image_uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            REACT_APP_GEMINI_API_KEY=${{ secrets.REACT_APP_GEMINI_API_KEY }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_URI: ${{ steps.ecr.outputs.image_uri }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,ECR_REGISTRY,IMAGE_URI,CONTAINER_NAME,HOST_PORT
          script: |
            set -euo pipefail

            SUDO=""
            if command -v sudo >/dev/null 2>&1 && [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
            fi

            aws ecr get-login-password --region "${AWS_REGION}" \
              | ${SUDO} docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            ${SUDO} docker pull "${IMAGE_URI}"
            ${SUDO} docker stop "${CONTAINER_NAME}" || true
            ${SUDO} docker rm "${CONTAINER_NAME}" || true

            ${SUDO} docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p "${HOST_PORT}:80" \
              "${IMAGE_URI}"

            ${SUDO} docker image prune -f
            ${SUDO} docker ps
